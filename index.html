<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Team Report">
<meta name="theme-color" content="#0F1417">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" media="print" onload="this.media='all'">
<title>Sowalem's Team Report</title>
<style>
:root{
  --bg:#0F1417; --panel:#161D22; --panel-2:#1C242A; --line:#28333A;
  --ink:#EAF0F2; --ink-dim:#8FA0A8; --ink-faint:#5C6B72;
  --gold:#C9A24B; --gold-dim:#8A7233; --teal:#3FA796; --teal-dim:#1F5249;
  --terra:#C9603F; --terra-dim:#5C3024; --good:#4FAE7A; --warn:#D9A441; --bad:#D9624F;
  --radius:14px; --radius-sm:9px;
  --font-display:'Tajawal','Segoe UI',Tahoma,sans-serif;
  --font-body:'IBM Plex Sans Arabic','Segoe UI',Tahoma,sans-serif;
  --font-mono:'Space Grotesk','IBM Plex Sans Arabic',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
input,select,textarea{font-size:16px;-webkit-text-size-adjust:100%;box-sizing:border-box;max-width:100%;}
body{background:var(--bg);background-image:radial-gradient(circle at 15% 0%,rgba(201,162,75,0.08),transparent 42%),radial-gradient(circle at 85% 100%,rgba(63,167,150,0.06),transparent 46%);color:var(--ink);font-family:var(--font-body);font-weight:400;letter-spacing:0.01em;line-height:1.5;min-height:100vh;padding-bottom:90px;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;overscroll-behavior-y:contain;touch-action:manipulation;}
::selection{background:var(--gold-dim);}
.topbar{position:sticky;top:0;z-index:50;background:#0F1417;border-bottom:1px solid var(--line);padding:14px 16px 12px;}
.topbar-row{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:900;font-size:16px;color:#1A1407;flex-shrink:0;}
.brand-text h1{font-family:var(--font-display);font-weight:700;font-size:16px;line-height:1.2;letter-spacing:-0.01em;}
.brand-text span{font-size:10.5px;color:var(--ink-dim);letter-spacing:0.06em;text-transform:uppercase;}
.month-pill{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--line);border-radius:20px;padding:6px 6px 6px 12px;}
.month-pill select{background:transparent;border:none;color:var(--ink);font-family:var(--font-mono);font-size:13px;font-weight:600;direction:ltr;}
.month-pill button{background:var(--gold);color:#1A1407;border:none;width:26px;height:26px;border-radius:50%;font-size:14px;font-weight:700;cursor:pointer;}
.view{display:none;padding:16px;max-width:720px;margin:0 auto;}
.view.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}
.division-switch{display:flex;gap:8px;margin-bottom:16px;}
.division-btn{flex:1;padding:11px;border-radius:12px;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);font-weight:700;font-size:13.5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;}
.division-btn .sw{width:8px;height:8px;border-radius:50%;background:var(--ink-faint);}
.division-btn.active.commercial{background:linear-gradient(135deg,rgba(201,162,75,0.16),var(--panel));border-color:var(--gold-dim);color:var(--gold);}
.division-btn.active.commercial .sw{background:var(--gold);}
.division-btn.active.residential{background:linear-gradient(135deg,rgba(63,167,150,0.16),var(--panel));border-color:var(--teal-dim);color:var(--teal);}
.division-btn.active.residential .sw{background:var(--teal);}
.section-label{font-family:var(--font-display);font-weight:700;font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:0.08em;margin:24px 0 11px;display:flex;align-items:center;gap:10px;opacity:0.92;}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent);}
.card{background:linear-gradient(180deg,#181F25,var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,0.25);}
.avatar{width:38px;height:38px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:14px;}
.avatar.commercial{background:rgba(201,162,75,0.15);color:var(--gold);}
.avatar.residential{background:rgba(63,167,150,0.15);color:var(--teal);}
.sp-name{font-weight:700;font-size:14.5px;}
.sp-sub{font-size:11.5px;color:var(--ink-dim);margin-top:2px;font-family:var(--font-mono);direction:ltr;text-align:left;}
.score-chip{font-family:var(--font-mono);font-weight:700;font-size:15px;padding:5px 10px;border-radius:8px;min-width:54px;text-align:center;}
.score-chip.s-good{background:rgba(79,174,122,0.15);color:var(--good);}
.score-chip.s-warn{background:rgba(217,164,65,0.15);color:var(--warn);}
.score-chip.s-bad{background:rgba(217,98,79,0.15);color:var(--bad);}
.score-chip.s-empty{background:var(--panel-2);color:var(--ink-faint);}
.target-row{display:flex;align-items:center;gap:10px;padding:14px 0 10px;}
.target-row label{font-size:12.5px;color:var(--ink-dim);flex:1 1 auto;min-width:0;}
.target-row input{flex:0 0 46%;max-width:46%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:11px 12px;color:var(--ink);font-family:var(--font-mono);font-size:16px;direction:ltr;text-align:left;min-width:0;}
.target-implied{font-size:11px;color:var(--ink-faint);margin-top:-4px;margin-bottom:8px;font-family:var(--font-mono);direction:ltr;text-align:left;}
.metric-bars{margin-top:16px;}
.mbar-row{margin-bottom:11px;}
.mbar-top{display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:5px;}
.mbar-top .mlabel{color:var(--ink-dim);font-weight:600;}
.mbar-top .mval{font-family:var(--font-mono);color:var(--ink);}
.mbar-track{height:7px;background:var(--panel-2);border-radius:4px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:4px;transition:width .4s ease;}
.mbar-fill.sales{background:linear-gradient(90deg,var(--gold-dim),var(--gold));}
.mbar-fill.reservations{background:linear-gradient(90deg,var(--teal-dim),var(--teal));}
.mbar-fill.appointments{background:linear-gradient(90deg,#5b4a8a,#8a6fd9);}
.btn-sm{flex:1;padding:9px;border-radius:9px;border:1px solid var(--line);background:var(--panel-2);color:var(--ink-dim);font-size:12px;font-weight:600;cursor:pointer;text-align:center;}
.btn-sm:active{background:var(--bg);}
.btn-sm.danger{color:var(--bad);border-color:var(--terra-dim);}
.btn-sm.whatsapp{color:#25D366;border-color:rgba(37,211,102,0.3);}
.add-btn{background:linear-gradient(135deg,var(--gold),#B8902F);color:#1A1407;border:none;border-radius:11px;padding:0 18px;font-weight:700;font-size:13.5px;cursor:pointer;font-family:var(--font-display);box-shadow:0 3px 10px rgba(201,162,75,0.18);}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#0F1417;border-top:1px solid var(--line);display:flex;padding:6px 4px calc(6px + env(safe-area-inset-bottom));overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.bottom-nav::-webkit-scrollbar{display:none;}
.nav-btn{flex:0 0 auto;min-width:62px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 6px;background:none;border:none;color:var(--ink-faint);cursor:pointer;font-size:10px;font-weight:600;}
.nav-btn.active{color:var(--gold);}
.nav-btn svg{width:20px;height:20px;}
.entry-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:10px;}
.entry-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
.entry-name{font-weight:700;font-size:14px;}
.entry-meta{font-size:11.5px;color:var(--ink-dim);margin-top:3px;line-height:1.5;}
.entry-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:6px;margin-left:6px;font-weight:600;}
.entry-tag.commercial{background:rgba(201,162,75,0.15);color:var(--gold);}
.entry-tag.residential{background:rgba(63,167,150,0.15);color:var(--teal);}
.entry-value{font-family:var(--font-mono);font-weight:700;font-size:15px;color:var(--good);white-space:nowrap;}
.entry-reason{margin-top:8px;padding-top:8px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-dim);}
.entry-actions{display:flex;gap:5px;justify-content:flex-end;margin-top:5px;}
.entry-iconbtn{background:var(--panel-2);border:1px solid var(--line);border-radius:7px;width:30px;height:28px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.entry-iconbtn.edit{color:var(--gold);border-color:var(--gold-dim);}
.entry-iconbtn.del{color:var(--bad);border-color:var(--terra-dim);}
.res-action-row{display:flex;gap:7px;margin-top:11px;padding-top:11px;border-top:1px solid var(--line);}
.res-action-btn{flex:1;padding:9px 6px;border-radius:8px;border:1px solid var(--line);background:var(--panel-2);font-size:11.5px;font-weight:700;cursor:pointer;}
.res-action-btn.deal{color:var(--good);border-color:rgba(79,174,122,0.3);}
.res-action-btn.cancel{color:var(--terra);border-color:var(--terra-dim);}
.res-action-btn.edit{flex:0 0 44px;color:var(--gold);border-color:var(--gold-dim);}
.res-action-btn.del{flex:0 0 44px;color:var(--bad);}
.res-action-btn:active{background:var(--bg);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.form-field{margin-bottom:10px;}
.form-field.full{grid-column:1/-1;}
.form-field label{display:block;font-size:11.5px;color:var(--ink-dim);margin-bottom:5px;font-weight:600;}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 11px;color:var(--ink);font-size:16px;font-family:var(--font-body);}
.form-field textarea{resize:vertical;min-height:60px;}
.form-submit{width:100%;background:linear-gradient(135deg,var(--gold),#B8902F);color:#1A1407;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;font-family:var(--font-display);letter-spacing:0.01em;box-shadow:0 3px 10px rgba(201,162,75,0.18);}
.form-submit:active{transform:scale(0.99);}
.filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;padding:7px 13px;border-radius:18px;border:1px solid var(--line);background:var(--panel);color:var(--ink-dim);font-size:12px;font-weight:600;cursor:pointer;}
.filter-chip.active{background:var(--panel-2);color:var(--ink);border-color:var(--gold-dim);}
.empty-state{text-align:center;padding:40px 20px;color:var(--ink-faint);}
.empty-state .ico{font-size:34px;margin-bottom:10px;opacity:0.5;}
.empty-state p{font-size:13px;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px;}
.stat-card{background:linear-gradient(180deg,#181F25,var(--panel));border:1px solid var(--line);border-radius:12px;padding:15px;box-shadow:0 1px 2px rgba(0,0,0,0.25);}
.stat-card .num{font-family:var(--font-mono);font-weight:700;font-size:22px;letter-spacing:-0.01em;}
.stat-card .lbl{font-size:11px;color:var(--ink-dim);margin-top:5px;letter-spacing:0.01em;}
.stat-card.wide{grid-column:1/-1;}
.chart-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;}
.chart-card h3{font-size:13px;font-weight:700;margin-bottom:12px;color:var(--ink-dim);}
.chart-wrap{position:relative;height:220px;}
.export-row{display:flex;gap:8px;}
.export-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;}
.export-btn.pdf{color:var(--terra);}
.export-btn.xlsx{color:var(--good);}
.export-btn.whatsapp{color:#25D366;}
.weight-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px;}
.weight-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.weight-row label{width:64px;font-size:12.5px;color:var(--ink-dim);flex-shrink:0;}
.weight-row input[type="range"]{flex:1;}
.weight-row .wval{width:42px;text-align:left;font-family:var(--font-mono);font-size:13px;direction:ltr;}
.weight-sum{font-size:11.5px;color:var(--ink-faint);text-align:center;margin-top:4px;}
.weight-sum.bad{color:var(--bad);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--panel);border-radius:18px 18px 0 0;width:100%;max-width:720px;padding:20px 18px calc(20px + env(safe-area-inset-bottom));max-height:88vh;overflow-y:auto;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.modal-head h3{font-family:var(--font-display);font-size:17px;font-weight:900;letter-spacing:-0.01em;}
.modal-close{background:var(--panel-2);border:none;color:var(--ink-dim);width:30px;height:30px;border-radius:50%;font-size:15px;cursor:pointer;}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:all .25s;pointer-events:none;max-width:90%;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.quote-banner{background:linear-gradient(135deg,rgba(201,162,75,0.18),rgba(28,36,42,0.6));border:1px solid var(--gold-dim);border-radius:14px;padding:18px 16px;margin-bottom:18px;text-align:center;position:relative;overflow:hidden;}
.quote-banner::before{content:'“';position:absolute;top:-10px;right:14px;font-size:60px;color:var(--gold);opacity:0.18;font-family:Georgia,serif;}
.quote-banner p{font-family:var(--font-display);font-weight:700;font-size:15.5px;line-height:1.7;color:var(--gold);}
.quote-banner span{display:block;margin-top:8px;font-size:11px;color:var(--ink-dim);letter-spacing:0.08em;text-transform:uppercase;}
.task-progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.task-progress-bar{flex:1;height:9px;background:var(--panel-2);border-radius:5px;overflow:hidden;}
.task-progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:5px;transition:width .3s;}
.task-progress-txt{font-family:var(--font-mono);font-size:13px;font-weight:700;color:var(--gold);flex-shrink:0;}
.task-item{display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,#181F25,var(--panel));border:1px solid var(--line);border-radius:12px;padding:15px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s;}
.task-item:active{transform:scale(0.99);}
.task-item.done{opacity:0.6;}
.task-check{width:26px;height:26px;border-radius:8px;border:2px solid var(--ink-faint);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.task-item.done .task-check{background:var(--gold);border-color:var(--gold);color:#1A1407;}
.task-check svg{width:15px;height:15px;opacity:0;}
.task-item.done .task-check svg{opacity:1;}
.task-label{font-size:14.5px;font-weight:600;line-height:1.4;}
.task-item.done .task-label{text-decoration:line-through;color:var(--ink-dim);}
.task-edit-row{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:10px 11px;margin-bottom:9px;}
.task-edit-row input{flex:1;background:var(--bg);border:1px solid var(--line);border-radius:7px;padding:9px 10px;color:var(--ink);font-size:16px;min-width:0;}
.task-edit-row .task-del{background:none;border:none;color:var(--bad);font-size:18px;cursor:pointer;flex-shrink:0;padding:2px 6px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.back-btn{background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);width:34px;height:34px;border-radius:9px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sp-hero{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.sp-hero .avatar{width:56px;height:56px;border-radius:14px;font-size:21px;}
.sp-hero-name{font-family:var(--font-display);font-weight:900;font-size:20px;letter-spacing:-0.01em;}
.sp-hero-title{font-size:12.5px;color:var(--ink-dim);margin-top:2px;}
.sp-type-tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:6px;margin-top:6px;}
.sp-type-tag.direct{background:rgba(138,111,217,0.16);color:#a78bf0;}
.sp-type-tag.standard{background:rgba(63,167,150,0.16);color:var(--teal);}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.team-card{background:linear-gradient(180deg,#181F25,var(--panel));border:1px solid var(--line);border-radius:var(--radius);padding:18px 12px;text-align:center;cursor:pointer;transition:all .18s;box-shadow:0 1px 2px rgba(0,0,0,0.25);position:relative;}
.team-card:active{border-color:var(--gold-dim);transform:scale(0.98);}
.team-card .avatar{width:50px;height:50px;margin:0 auto 11px;font-size:19px;border-radius:14px;}
.team-card .tname{font-weight:700;font-size:14px;letter-spacing:-0.01em;}
.team-card .ttitle{font-size:10.5px;color:var(--ink-faint);margin-top:2px;min-height:13px;}
.team-card .tscore{margin-top:8px;}
.team-card-del{position:absolute;top:8px;left:8px;background:rgba(217,98,79,0.15);border:none;color:var(--bad);width:24px;height:24px;border-radius:7px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.team-card-add{display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px dashed var(--line);background:transparent;box-shadow:none;}
.team-card-add .plus{width:50px;height:50px;border-radius:14px;background:var(--panel-2);display:flex;align-items:center;justify-content:center;font-size:24px;color:var(--gold);margin-bottom:11px;}
.team-card-add .tname{color:var(--ink-dim);}
.daily-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;margin-bottom:4px;}
.day-col{background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:6px 3px;min-width:0;}
.day-col h5{font-size:9px;color:var(--ink-faint);text-align:center;margin-bottom:6px;font-weight:600;}
.day-col input{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:6px 1px;color:var(--ink);font-family:var(--font-mono);font-size:15px;text-align:center;margin-bottom:4px;min-width:0;box-sizing:border-box;}
.day-col input:last-child{margin-bottom:0;}
.day-col .dlabel{font-size:8px;color:var(--ink-faint);text-align:center;margin-bottom:1px;}
.daily-totals{display:flex;gap:8px;margin-top:10px;}
.daily-total-chip{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:9px 6px;text-align:center;}
.daily-total-chip .v{font-family:var(--font-mono);font-weight:700;font-size:15px;}
.daily-total-chip .l{font-size:9.5px;color:var(--ink-dim);margin-top:2px;}

<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay"><div class="modal-sheet" id="modalSheet"></div></div>
<script>
// ============================================================
// Sowalem's Team Report
// ============================================================
let DB=null;
const DB_STORAGE_KEY='sowalemTeamDB_v2';
const BACKUP_STORAGE_KEY='sowalemTeamBackup_v2';
const AUTO_BACKUP_KEY='sowalemTeamAuto_v2';
const _hasClaudeStorage=(typeof window!=='undefined'&&window.storage&&window.storage.get&&window.storage.set);
let _hasLocalStorage=false;
try{ if(typeof window!=='undefined'&&window.localStorage){ const _t='__sowalem_test__'; window.localStorage.setItem(_t,'1'); window.localStorage.removeItem(_t); _hasLocalStorage=true; } }catch(e){ _hasLocalStorage=false; }
const _hasStorage=_hasClaudeStorage||_hasLocalStorage;

function defaultSp(idx){ return { id:'sp'+idx, name:'Salesperson '+idx, title:'', joinDate:'', notes:'', type:'standard', brokerCount:0, brokerAccounts:[] }; }
function defaultDB(){
  return {
    weights:{sales:75,reservations:10,orientation:10,attendance:5},
    salespeople:[1,2,3,4,5,6].map(defaultSp),
    nextSpIdx:7, spTargets:{}, daily:{}, doneDeals:[], reservations:[], cancellations:[],
    salesLog:{managerTotal:0,rows:[],spExtra:{},monthRows:{}},
    commissionTiers:{stdLow:6000,stdHigh:7000,stdThreshold:60,direct:12000,mgrLow:2500,mgrHigh:3000,mgrThreshold:70,mgrDirect:4000},
    orientationPerDay:2, meetingsPerDay:2, meetingsPerMonth:8, dayOff:5,
    myTasks:{date:'',template:['10 calls to broker companies','Attend 2 meetings','Visit an orientation company','Follow the market & its news',"Review the sales team's performance"],checked:{}},
    currentMonth:monthKey(new Date()), currentDivision:'commercial', activeTab:'team', route:{view:'list'}
  };
}
function monthKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function monthLabel(mk){ const [y,m]=mk.split('-').map(Number); const names=['January','February','March','April','May','June','July','August','September','October','November','December']; return names[m-1]+' '+y; }
function shiftMonth(mk,delta){ let [y,m]=mk.split('-').map(Number); m+=delta; if(m>12){m=1;y++;} if(m<1){m=12;y--;} return y+'-'+String(m).padStart(2,'0'); }
function daysInMonth(mk){ const [y,m]=mk.split('-').map(Number); return new Date(y,m,0).getDate(); }
function dateStr(mk,day){ const [y,m]=mk.split('-').map(Number); return y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0'); }
function weekdayShort(mk,day){ const [y,m]=mk.split('-').map(Number); const d=new Date(y,m-1,day); return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]; }
function isWorkingDay(mk,day,off){ const [y,m]=mk.split('-').map(Number); return new Date(y,m-1,day).getDay()!==off; }

function load(){ try{ DB=(window._memoryDB)?JSON.parse(JSON.stringify(window._memoryDB)):defaultDB(); }catch(e){ DB=defaultDB(); } normalizeDB(); }
function normalizeDB(){
  if(!DB.weights) DB.weights={sales:75,reservations:10,orientation:10,attendance:5};
  if(DB.weights.attendance===undefined){ DB.weights.attendance=DB.weights.appointments||5; delete DB.weights.appointments; }
  if(DB.weights.orientation===undefined) DB.weights.orientation=10;
  if(!DB.currentMonth) DB.currentMonth=monthKey(new Date());
  if(!DB.currentDivision) DB.currentDivision='commercial';
  if(!DB.activeTab) DB.activeTab='team';
  if(DB.activeTab==='saleslog') DB.activeTab='reports';
  if(DB.activeTab==='mydeals') DB.activeTab='reports';
  if(!DB.route) DB.route={view:'list'};
  if(!DB.daily) DB.daily={};
  if(!DB.spTargets){
    DB.spTargets={};
    if(DB.targets){ Object.keys(DB.targets).forEach(k=>{ const p=k.split('_'); if(p.length===3){ const spId=p[0],division=p[1],month=p[2]; const key=spId+'_'+month; if(!DB.spTargets[key]) DB.spTargets[key]={mode:'split',total:{sales:0,reservations:0},commercial:{sales:0,reservations:0},residential:{sales:0,reservations:0}}; if(division==='commercial'||division==='residential'){ DB.spTargets[key][division]={sales:DB.targets[k].sales||0,reservations:DB.targets[k].reservations||0}; DB.spTargets[key].total.sales=(DB.spTargets[key].commercial.sales||0)+(DB.spTargets[key].residential.sales||0); DB.spTargets[key].total.reservations=(DB.spTargets[key].commercial.reservations||0)+(DB.spTargets[key].residential.reservations||0); } } }); }
  }
  if(!DB.doneDeals) DB.doneDeals=[];
  if(!DB.reservations) DB.reservations=[];
  if(!DB.cancellations) DB.cancellations=[];
  if(!DB.salesLog) DB.salesLog={managerTotal:0,rows:[],spExtra:{},monthRows:{}};
  if(DB.salesLog.managerTotal===undefined) DB.salesLog.managerTotal=0;
  if(!Array.isArray(DB.salesLog.rows)) DB.salesLog.rows=[];
  if(!DB.salesLog.spExtra||typeof DB.salesLog.spExtra!=='object') DB.salesLog.spExtra={};
  if(!DB.salesLog.monthRows||typeof DB.salesLog.monthRows!=='object'||Array.isArray(DB.salesLog.monthRows)) DB.salesLog.monthRows={};
  (function(){ var cm=DB.currentMonth||monthKey(new Date()); var mk=/^\d{4}-\d{2}$/; var legacy={}, has=false; Object.keys(DB.salesLog.spExtra).forEach(function(k){ if(!mk.test(k)){ legacy[k]=DB.salesLog.spExtra[k]; has=true; delete DB.salesLog.spExtra[k]; } }); if(has){ if(!DB.salesLog.spExtra[cm]) DB.salesLog.spExtra[cm]={}; Object.keys(legacy).forEach(function(spId){ DB.salesLog.spExtra[cm][spId]=legacy[spId]; }); } if(Array.isArray(DB.salesLog.rows)&&DB.salesLog.rows.length){ if(!DB.salesLog.monthRows[cm]) DB.salesLog.monthRows[cm]=[]; DB.salesLog.rows.forEach(function(r){ DB.salesLog.monthRows[cm].push(r); }); DB.salesLog.rows=[]; } })();
  Object.keys(DB.salesLog.monthRows).forEach(function(m){ (DB.salesLog.monthRows[m]||[]).forEach(function(r){ if(!r.id) r.id=uid(); if(r.name===undefined) r.name=''; if(r.value===undefined&&r.sales!==undefined) r.value=r.sales; if(r.value===undefined) r.value=0; if(r.count===undefined) r.count=0; }); });
  if(!DB.commissionTiers) DB.commissionTiers={stdLow:6000,stdHigh:7000,stdThreshold:60,direct:12000,mgrLow:2500,mgrHigh:3000,mgrThreshold:70,mgrDirect:4000};
  if(DB.orientationPerDay===undefined) DB.orientationPerDay=2;
  if(DB.meetingsPerDay===undefined) DB.meetingsPerDay=2;
  if(DB.meetingsPerMonth===undefined) DB.meetingsPerMonth=8;
  if(DB.dayOff===undefined) DB.dayOff=5;
  if(!DB.myTasks) DB.myTasks={date:'',template:['10 calls to broker companies','Attend 2 meetings','Visit an orientation company','Follow the market & its news',"Review the sales team's performance"],checked:{}};
  if(!DB.myTasks.template) DB.myTasks.template=['10 calls to broker companies','Attend 2 meetings','Visit an orientation company','Follow the market & its news',"Review the sales team's performance"];
  if(!DB.myTasks.checked) DB.myTasks.checked={};
  if(!DB.salespeople||DB.salespeople.length===0) DB.salespeople=[1,2,3,4,5,6].map(defaultSp);
  if(!DB.nextSpIdx) DB.nextSpIdx=DB.salespeople.length+1;
  DB.salespeople.forEach(sp=>{ if(!sp.type) sp.type='standard'; if(!sp.brokerAccounts) sp.brokerAccounts=[]; if(sp.brokerCount===undefined) sp.brokerCount=sp.brokerAccounts.filter(a=>a.name&&a.name.trim()).length; if(sp.title===undefined) sp.title=''; if(sp.joinDate===undefined) sp.joinDate=''; if(sp.notes===undefined) sp.notes=''; });
  Object.values(DB.daily).forEach(monthObj=>{ Object.values(monthObj).forEach(rec=>{ if(rec.checkIn!==undefined&&rec.attendIn===undefined){ rec.attendIn=rec.checkIn?'ontime':''; } if(rec.checkOut!==undefined&&rec.attendOut===undefined){ rec.attendOut=rec.checkOut?'ontime':''; } if(rec.orientation===undefined) rec.orientation=(rec.leads!==undefined?rec.leads:0); if(rec.meetings===undefined) rec.meetings=0; delete rec.checkIn; delete rec.checkOut; }); });
}

// ---------- Persistence (auto-save, multi-layer, offline-safe) ----------
let _saveTimer=null; let _dirty=false;
function save(){
  try{ window._memoryDB=JSON.parse(JSON.stringify(DB)); }catch(e){}
  _dirty=true;
  if(_hasStorage){ if(_saveTimer) clearTimeout(_saveTimer); _saveTimer=setTimeout(flushSave,180); }
}
function flushSave(){
  if(_saveTimer){ clearTimeout(_saveTimer); _saveTimer=null; }
  let payload; try{ payload=JSON.stringify(DB); }catch(e){ return; }
  _dirty=false;
  try{
    if(_hasClaudeStorage){ window.storage.set(DB_STORAGE_KEY,payload).catch(()=>{}); window.storage.set(AUTO_BACKUP_KEY,payload).catch(()=>{}); }
    else if(_hasLocalStorage){ window.localStorage.setItem(DB_STORAGE_KEY,payload); try{ window.localStorage.setItem(AUTO_BACKUP_KEY,payload); }catch(e2){} }
  }catch(e){ try{ if(_hasLocalStorage){ window.localStorage.removeItem(AUTO_BACKUP_KEY); window.localStorage.setItem(DB_STORAGE_KEY,payload); } }catch(e3){} }
}
function readDurable(key){
  if(_hasClaudeStorage){ return window.storage.get(key).then(res=>(res&&res.value)?JSON.parse(res.value):null).catch(()=>null); }
  if(_hasLocalStorage){ try{ const raw=window.localStorage.getItem(key); return Promise.resolve(raw?JSON.parse(raw):null); }catch(e){ return Promise.resolve(null); } }
  return Promise.resolve(null);
}
async function loadFromStorage(){
  if(!_hasStorage) return;
  let loaded=null;
  try{ loaded=await readDurable(DB_STORAGE_KEY); }catch(e){ loaded=null; }
  if(!loaded){ try{ loaded=await readDurable(AUTO_BACKUP_KEY); }catch(e){ loaded=null; } }
  if(loaded){ try{ DB=loaded; normalizeDB(); return; }catch(e){} }
  save();
}
async function quickBackup(){
  if(!_hasStorage){ showToast('Backup needs storage access'); return; }
  try{ const payload=JSON.stringify({savedAt:new Date().toISOString(),db:DB}); if(_hasClaudeStorage){ await window.storage.set(BACKUP_STORAGE_KEY,payload); } else { window.localStorage.setItem(BACKUP_STORAGE_KEY,payload); } showToast('Backup saved ✓'); }
  catch(e){ showToast('Backup failed'); }
}
async function quickRestore(){
  if(!_hasStorage){ showToast('Restore needs storage access'); return; }
  try{ const parsed=await readDurable(BACKUP_STORAGE_KEY); if(parsed){ DB=(parsed&&parsed.db)?parsed.db:parsed; normalizeDB(); save(); render(); showToast('Last backup restored ✓'); } else { showToast('No backup found yet'); } }
  catch(e){ showToast('No backup found yet'); }
}
function storageStatusText(){
  if(_hasClaudeStorage) return 'Auto-saving continuously (Claude storage). Data is kept between sessions.';
  if(_hasLocalStorage) return 'Auto-saving continuously in this browser (Safari) — every edit is written instantly and again whenever you switch apps or close it. Keep a JSON backup too, in case Safari data is cleared.';
  return 'Storage unavailable — data is kept only until you close. Use Backup (JSON) often.';
}

// ---- Lazy load external libs ----
const _libState={chart:null,jspdf:null,html2canvas:null};
function loadScript(src){ return new Promise((resolve,reject)=>{ const existing=document.querySelector('script[data-src="'+src+'"]'); if(existing){ existing.addEventListener('load',()=>resolve()); existing.addEventListener('error',()=>reject()); if(existing.dataset.loaded) resolve(); return; } const s=document.createElement('script'); s.src=src; s.dataset.src=src; s.onload=()=>{ s.dataset.loaded='1'; resolve(); }; s.onerror=()=>reject(new Error('load failed')); document.head.appendChild(s); }); }
function ensureChart(){ if(typeof Chart!=='undefined') return Promise.resolve(true); if(!_libState.chart) _libState.chart=loadScript('https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js').then(()=>true).catch(()=>{ _libState.chart=null; return false; }); return _libState.chart; }
function ensureJsPDF(){ if(typeof window.jspdf!=='undefined'&&window.jspdf.jsPDF) return Promise.resolve(true); if(!_libState.jspdf) _libState.jspdf=loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js').then(()=>true).catch(()=>{ _libState.jspdf=null; return false; }); return _libState.jspdf; }
function ensureHtml2Canvas(){ if(typeof window.html2canvas!=='undefined') return Promise.resolve(true); if(!_libState.html2canvas) _libState.html2canvas=loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js').then(()=>true).catch(()=>{ _libState.html2canvas=null; return false; }); return _libState.html2canvas; }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }

// ---------- My daily tasks ----------
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function refreshMyTasksIfNewDay(){ const t=todayStr(); if(DB.myTasks.date!==t){ DB.myTasks.date=t; DB.myTasks.checked={}; save(); } }
function toggleMyTask(idx){ DB.myTasks.checked[idx]=!DB.myTasks.checked[idx]; save(); }
function addMyTask(text){ if(!text||!text.trim()) return; DB.myTasks.template.push(text.trim()); save(); }
function removeMyTask(idx){ DB.myTasks.template.splice(idx,1); const nc={}; DB.myTasks.template.forEach((_,i)=>{ if(DB.myTasks.checked[i<idx?i:i+1]) nc[i]=true; }); DB.myTasks.checked=nc; save(); }
function editMyTask(idx,text){ if(text!==undefined&&DB.myTasks.template[idx]!==undefined) DB.myTasks.template[idx]=text; save(); }
function showToast(msg){ const t=document.getElementById('toast'); if(!t) return; t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1900); }

load();

function getSp(spId){ return DB.salespeople.find(s=>s.id===spId); }
function isDirect(spId){ const sp=getSp(spId); return sp&&sp.type==='direct'; }
function spName(id){ const sp=getSp(id); return sp?sp.name:'—'; }
function divisionLabel(d){ return d==='commercial'?'Commercial':'Residential'; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtMoney(n){ n=Number(n)||0; return n.toLocaleString('en-US'); }
function fmtPct(n){ if(!isFinite(n)) n=0; return (Math.round(n*10)/10).toFixed(1); }
function round1(n){ return Math.round((Number(n)||0)*10)/10; }

function addSalesperson(){ const idx=DB.nextSpIdx++; const sp=defaultSp(idx); sp.name='New Salesperson'; DB.salespeople.push(sp); save(); return sp; }
function removeSalesperson(spId){ DB.salespeople=DB.salespeople.filter(s=>s.id!==spId); if(DB.route.view==='detail'&&DB.route.spId===spId) DB.route={view:'list'}; save(); }

function stKey(spId,month){ return spId+'_'+month; }
function defaultSpTarget(){ return {mode:'total',total:{sales:0,reservations:0},commercial:{sales:0,reservations:0},residential:{sales:0,reservations:0}}; }
function getSpTargetObj(spId,month){ return DB.spTargets[stKey(spId,month)]||defaultSpTarget(); }
function ensureSpTarget(spId,month){ const k=stKey(spId,month); if(!DB.spTargets[k]) DB.spTargets[k]=defaultSpTarget(); return DB.spTargets[k]; }
function setSpTargetMode(spId,month,mode){ ensureSpTarget(spId,month).mode=mode; save(); }
function setSpTargetField(spId,month,scope,field,value){ const o=ensureSpTarget(spId,month); if(!o[scope]) o[scope]={sales:0,reservations:0}; o[scope][field]=value; save(); }
function totalTarget(spId,month){ const o=getSpTargetObj(spId,month); if(o.mode==='split') return {sales:(o.commercial.sales||0)+(o.residential.sales||0),reservations:(o.commercial.reservations||0)+(o.residential.reservations||0)}; return {sales:o.total.sales||0,reservations:o.total.reservations||0}; }
function getTarget(spId,division,month){ const o=getSpTargetObj(spId,month); if(isDirect(spId)) return {sales:o.total.sales||0,reservations:0}; if(o.mode==='split') return {sales:(o[division]?o[division].sales:0)||0,reservations:(o[division]?o[division].reservations:0)||0}; return {sales:0,reservations:0}; }

function orientationPerDay(){ return DB.orientationPerDay!==undefined?DB.orientationPerDay:2; }
function workingDaysInMonth(month){ const total=daysInMonth(month); let n=0; const off=(DB.dayOff!==undefined?DB.dayOff:5); for(let d=1;d<=total;d++){ if(isWorkingDay(month,d,off)) n++; } return n; }
function orientationMonthlyTarget(spId,month){ return workingDaysInMonth(month)*orientationPerDay(); }
function meetingsPerMonth(){ return DB.meetingsPerMonth!==undefined?DB.meetingsPerMonth:8; }
function meetingsMonthlyTarget(spId,month){ return meetingsPerMonth(); }
function meetingsAchieved(spId,month){ const md=getDailyMonth(spId,month); let n=0; Object.values(md).forEach(d=>{ n+=Number(d.meetings)||0; }); return n; }
function orientationAchieved(spId,month){ const md=getDailyMonth(spId,month); let n=0; if(isDirect(spId)){ Object.values(md).forEach(d=>{ n+=(Number(d.interested)||0)+(Number(d.notInterested)||0); }); } else { Object.values(md).forEach(d=>{ n+=Number(d.orientation)||0; }); } return n; }

// ---- Shared-deal credit logic (only the allocated share counts for team + manager) ----
function reservationShareFrac(r){ if(!r.share||!r.share.enabled) return 1; const pct=Number(r.share.pct)||50; return (r.role==='partner')?(100-pct)/100:pct/100; }
function reservationCreditValue(r){ if(!r.share||!r.share.enabled) return Number(r.value)||0; return Math.round((Number(r.value)||0)*reservationShareFrac(r)); }
function monthReservations(spId,division,month){ return DB.reservations.filter(r=>r.spId===spId&&r.division===division&&(r.date||'').slice(0,7)===month).reduce((s,r)=>s+reservationShareFrac(r),0); }

function dealCredit(deal){ if(!deal.share||!deal.share.enabled) return Number(deal.value)||0; const pct=Number(deal.share.pct)||50; if(deal.role==='partner') return Math.round((Number(deal.value)||0)*(100-pct)/100); return Math.round((Number(deal.value)||0)*pct/100); }
function monthSales(spId,division,month){ return DB.doneDeals.filter(d=>d.spId===spId&&d.division===division&&(d.date||'').slice(0,7)===month).reduce((s,d)=>s+dealCredit(d),0); }
function spTotalMonthSales(spId,month){ return monthSales(spId,'commercial',month)+monthSales(spId,'residential',month); }

function getDailyMonth(spId,month){ const k=spId+'_'+month; if(!DB.daily[k]) DB.daily[k]={}; return DB.daily[k]; }
function getDaily(spId,month,day){ const md=getDailyMonth(spId,month); const ds=dateStr(month,day); if(!md[ds]) md[ds]={attendIn:'',attendOut:'',leads:0,orientation:0,orientCompanies:[],meetings:0,interested:0,notInterested:0}; if(md[ds].attendIn===undefined) md[ds].attendIn=''; if(md[ds].attendOut===undefined) md[ds].attendOut=''; if(md[ds].orientation===undefined) md[ds].orientation=0; if(!Array.isArray(md[ds].orientCompanies)) md[ds].orientCompanies=[]; if(md[ds].meetings===undefined) md[ds].meetings=0; return md[ds]; }
function setDaily(spId,month,day,field,value){ const md=getDailyMonth(spId,month); const ds=dateStr(month,day); if(!md[ds]) md[ds]={attendIn:'',attendOut:'',leads:0,orientation:0,orientCompanies:[],meetings:0,interested:0,notInterested:0}; md[ds][field]=value; if(field==='orientation'){ const n=Number(value)||0; if(!Array.isArray(md[ds].orientCompanies)) md[ds].orientCompanies=[]; md[ds].orientCompanies=md[ds].orientCompanies.slice(0,n); while(md[ds].orientCompanies.length<n) md[ds].orientCompanies.push(''); } save(); }
function setDailyCompany(spId,month,day,idx,value){ const md=getDailyMonth(spId,month); const ds=dateStr(month,day); if(!md[ds]) md[ds]={attendIn:'',attendOut:'',leads:0,orientation:0,orientCompanies:[],meetings:0,interested:0,notInterested:0}; if(!Array.isArray(md[ds].orientCompanies)) md[ds].orientCompanies=[]; md[ds].orientCompanies[idx]=value; save(); }
function attendanceStats(spId,month){ const md=getDailyMonth(spId,month); let scoreSum=0,recordedDays=0,onTimeInDays=0,lateInDays=0,onTimeOutDays=0,earlyOutDays=0; Object.values(md).forEach(rec=>{ const hasIn=rec.attendIn==='ontime'||rec.attendIn==='late'; const hasOut=rec.attendOut==='ontime'||rec.attendOut==='early'; if(!hasIn&&!hasOut) return; recordedDays++; let daySc=0,parts=0; if(hasIn){ parts++; if(rec.attendIn==='ontime'){ daySc+=100; onTimeInDays++; } else { lateInDays++; } } if(hasOut){ parts++; if(rec.attendOut==='ontime'){ daySc+=100; onTimeOutDays++; } else { earlyOutDays++; } } scoreSum+=parts>0?daySc/parts:0; }); const pct=recordedDays>0?(scoreSum/recordedDays):0; return {pct,recordedDays,onTimeInDays,lateInDays,onTimeOutDays,earlyOutDays}; }
function dailyInfoTotals(spId,month){ const md=getDailyMonth(spId,month); const t={interested:0,notInterested:0}; Object.values(md).forEach(d=>{ t.interested+=Number(d.interested)||0; t.notInterested+=Number(d.notInterested)||0; }); return t; }

function effectiveWeights(spId){ if(isDirect(spId)) return {sales:80,reservations:0,meetings:15,orientation:0,attendance:5}; return DB.weights; }
function divisionScore(spId,division,month){ const target=getTarget(spId,division,month); const splitMode=getSpTargetObj(spId,month).mode==='split'; const salesActual=(isDirect(spId)||!splitMode)?spTotalMonthSales(spId,month):monthSales(spId,division,month); const resActual=monthReservations(spId,division,month); const att=attendanceStats(spId,month); const orientTarget=orientationMonthlyTarget(spId,month); const orientActual=orientationAchieved(spId,month); const meetTarget=meetingsMonthlyTarget(spId,month); const meetActual=meetingsAchieved(spId,month); const pct=(a,t)=>t>0?(a/t)*100:(a>0?100:0); const pSales=pct(salesActual,target.sales); const pRes=pct(resActual,target.reservations); const pAtt=att.pct; const pOrient=pct(orientActual,orientTarget); const pMeet=pct(meetActual,meetTarget); const w=effectiveWeights(spId); const wsum=(w.sales+w.reservations+(w.orientation||0)+(w.meetings||0)+w.attendance)||1; const composite=(pSales*w.sales+pRes*w.reservations+pOrient*(w.orientation||0)+pMeet*(w.meetings||0)+pAtt*w.attendance)/wsum; return {pSales,pRes,pAtt,pOrient,pMeet,composite,target,actual:{sales:salesActual,reservations:resActual},att,orientTarget,orientActual,meetTarget,meetActual}; }
function combinedScore(spId,month){ const com=divisionScore(spId,'commercial',month); const res=divisionScore(spId,'residential',month); const target=totalTarget(spId,month); const actual={sales:spTotalMonthSales(spId,month),reservations:monthReservations(spId,'commercial',month)+monthReservations(spId,'residential',month)}; const att=attendanceStats(spId,month); const orientTarget=orientationMonthlyTarget(spId,month); const orientActual=orientationAchieved(spId,month); const pct=(a,t)=>t>0?(a/t)*100:(a>0?100:0); const pSales=pct(actual.sales,target.sales); const pRes=pct(actual.reservations,target.reservations); const pAtt=att.pct; const pOrient=pct(orientActual,orientTarget); const w=effectiveWeights(spId); const wsum=(w.sales+w.reservations+(w.orientation||0)+(w.meetings||0)+w.attendance)||1; const composite=(pSales*w.sales+pRes*w.reservations+pOrient*(w.orientation||0)+pAtt*w.attendance)/wsum; return {pSales,pRes,pAtt,pOrient,pMeet:0,composite,target,actual,att,orientTarget,orientActual,byDivision:{commercial:com,residential:res}}; }
function scoreClass(pct,has){ if(!has) return 's-empty'; if(pct>=90) return 's-good'; if(pct>=60) return 's-warn'; return 's-bad'; }
function spHasTarget(cs){ return cs.target.sales>0||cs.target.reservations>0||cs.att.recordedDays>0||(cs.actual&&cs.actual.sales>0)||(cs.orientActual&&cs.orientActual>0)||(cs.meetActual&&cs.meetActual>0); }

function brokerStats(sp){ const total=Number(sp.brokerCount)||0; const namedTop=sp.brokerAccounts.filter(a=>a.name&&a.name.trim()).length; const shared=sp.brokerAccounts.filter(a=>a.name&&a.name.trim()&&a.sharedWith&&a.sharedWith.trim()).length; return {total,namedTop,shared,exclusive:namedTop-shared}; }
function isDealComplete(d){ if(d.downFull) return true; if(Number(d.downPct)>=100) return true; return false; }

const MILLION=1000000;
// Commission is computed on CREDITED sales (each one's allocated share of shared deals only)
function spCommission(spId,month){ const tiers=DB.commissionTiers; const sales=monthSales(spId,'commercial',month)+monthSales(spId,'residential',month); const millions=sales/MILLION; if(isDirect(spId)) return {sales,rate:tiers.direct,amount:Math.round(millions*tiers.direct),tier:'direct'}; const target=totalTarget(spId,month).sales; const pctOfTarget=target>0?(sales/target)*100:0; const rate=pctOfTarget>=tiers.stdThreshold?tiers.stdHigh:tiers.stdLow; return {sales,rate,amount:Math.round(millions*rate),tier:pctOfTarget>=tiers.stdThreshold?'high':'low',pctOfTarget}; }
function managerCommission(month){ const tiers=DB.commissionTiers; let stdSales=0,stdTarget=0,directSales=0; DB.salespeople.forEach(sp=>{ const s=monthSales(sp.id,'commercial',month)+monthSales(sp.id,'residential',month); if(isDirect(sp.id)){ directSales+=s; } else { stdSales+=s; stdTarget+=totalTarget(sp.id,month).sales; } }); const stdPctOfTarget=stdTarget>0?(stdSales/stdTarget)*100:0; const stdRate=stdPctOfTarget>=tiers.mgrThreshold?tiers.mgrHigh:tiers.mgrLow; const stdAmount=Math.round((stdSales/MILLION)*stdRate); const directAmount=Math.round((directSales/MILLION)*tiers.mgrDirect); return {stdSales,stdTarget,stdPctOfTarget,stdRate,stdAmount,directSales,directRate:tiers.mgrDirect,directAmount,total:stdAmount+directAmount}; }

// SALES LOG (free record — no calculations, no reports)
// ============================================================
function dealContractFrac(deal){ if(!deal.share||!deal.share.enabled) return 1; const pct=Number(deal.share.pct)||50; return (deal.role==='partner')?(100-pct)/100:pct/100; }
function salesLogMonthRows(month){ if(!DB.salesLog.monthRows[month]) DB.salesLog.monthRows[month]=[]; return DB.salesLog.monthRows[month]; }
function getSpExtra(month,spId){ const m=DB.salesLog.spExtra[month]; const e=m&&m[spId]; return {count:Number(e&&e.count)||0, value:Number(e&&e.value)||0}; }
function setSpExtra(month,spId,field,val){ if(!DB.salesLog.spExtra[month]) DB.salesLog.spExtra[month]={}; if(!DB.salesLog.spExtra[month][spId]) DB.salesLog.spExtra[month][spId]={count:0,value:0}; DB.salesLog.spExtra[month][spId][field]=Number(val)||0; save(); }
function salesLogAutoRows(month){ return DB.salespeople.map(sp=>{ const deals=DB.doneDeals.filter(d=>d.spId===sp.id&&(d.date||'').slice(0,7)===month); const autoValue=deals.reduce((s,d)=>s+dealCredit(d),0); const autoCount=deals.reduce((s,d)=>s+dealContractFrac(d),0); const ex=getSpExtra(month,sp.id); return {spId:sp.id, name:sp.name, autoCount, autoValue, extraCount:ex.count, extraValue:ex.value, count:autoCount+ex.count, value:autoValue+ex.value}; }); }
function salesLogManualValue(r){ return Number(r.value!==undefined?r.value:(r.sales||0))||0; }
function salesLogTotals(month){ let count=0,value=0; salesLogAutoRows(month).forEach(r=>{ count+=r.count; value+=r.value; }); salesLogMonthRows(month).forEach(r=>{ count+=Number(r.count)||0; value+=salesLogManualValue(r); }); return {count,value}; }
function addSalesLogRow(month){ salesLogMonthRows(month).push({id:uid(),name:'',count:0,value:0}); save(); }
function removeSalesLogRow(month,id){ DB.salesLog.monthRows[month]=salesLogMonthRows(month).filter(r=>r.id!==id); save(); }
function moveSalesLogRow(month,id,dir){ const arr=salesLogMonthRows(month); const i=arr.findIndex(r=>r.id===id); if(i<0) return; const j=i+dir; if(j<0||j>=arr.length) return; const t=arr[i]; arr[i]=arr[j]; arr[j]=t; save(); }

  const totalSalesAchieved=monthSales(sp.id,'commercial',month)+monthSales(sp.id,'residential',month);

  const orientTarget=orientationMonthlyTarget(sp.id,month); const orientDone=orientationAchieved(sp.id,month);
  const info=dailyInfoTotals(sp.id,month); const bStats=brokerStats(sp);
  return `<div class="section-label">Targets</div>
    <div class="card">
      <div class="division-switch" style="margin-bottom:14px;"><button class="division-btn ${o.mode==='total'?'active commercial':''}" data-tmode="total"><span class="sw"></span> Total Target</button><button class="division-btn ${o.mode==='split'?'active residential':''}" data-tmode="split"><span class="sw"></span> Split (Com / Res)</button></div>

function workingDaysList(month){ const totalDays=daysInMonth(month); const off=(DB.dayOff!==undefined?DB.dayOff:5); const list=[]; for(let d=1;d<=totalDays;d++){ if(isWorkingDay(month,d,off)) list.push(d); } return list; }
function renderAttendanceGrid(sp,month){

function renderDealsView(){

  if(divFilter==='commercial'||divFilter==='residential') deals=deals.filter(d=>d.division===divFilter);

function readImageResized(file,maxDim,cb){ const reader=new FileReader(); reader.onload=e=>{ const img=new Image(); img.onload=()=>{ let w=img.width,h=img.height; if(w>h){ if(w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; } } else { if(h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; } } const c=document.createElement('canvas'); c.width=w; c.height=h; c.getContext('2d').drawImage(img,0,0,w,h); try{ cb(c.toDataURL('image/jpeg',0.7)); }catch(err){ cb(null); } }; img.onerror=()=>cb(null); img.src=e.target.result; }; reader.onerror=()=>cb(null); reader.readAsDataURL(file); }

function rowsToCSV(rows){ return rows.map(r=>r.map(c=>{ let v=(c===undefined||c===null)?'':String(c); v=v.replace(/<[^>]*>/g,''); if(/[",\n]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v; }).join(',')).join('\r\n'); }
function downloadCSV(filename,rows,title){ shareOrDownload(filename,'text/csv;charset=utf-8','\uFEFF'+rowsToCSV(rows),{title}); }
async function shareOrDownload(filename,mime,content,opts){
  opts=opts||{}; let blob; try{ blob=new Blob([content],{type:mime}); }catch(e){ showToast('Could not prepare the file'); return; }
  try{ if(navigator.share&&navigator.canShare){ const file=new File([blob],filename,{type:mime}); if(navigator.canShare({files:[file]})){ await navigator.share({files:[file],title:opts.title||filename}); showToast('Shared ✓'); return; } } }catch(e){ if(e&&e.name==='AbortError') return; }
  if(opts.openInTab){ try{ const url=URL.createObjectURL(blob); const w=window.open(url,'_blank'); if(w){ showToast('Opened — use Print / Share from there'); setTimeout(()=>URL.revokeObjectURL(url),60000); return; } }catch(e){} }
  try{ const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=filename; a.style.display='none'; a.rel='noopener'; document.body.appendChild(a); a.click(); setTimeout(()=>{ try{ document.body.removeChild(a); }catch(e){} URL.revokeObjectURL(url); },2000); showToast('Downloaded ✓'); return; }catch(e){}
  try{ const reader=new FileReader(); reader.onload=()=>openManualSaveModal(filename,reader.result); reader.onerror=()=>showToast('Could not prepare the file'); reader.readAsDataURL(blob); }catch(e){ showToast('Could not prepare the file'); }
}
function openManualSaveModal(filename,dataUrl){ openModal(`<div class="modal-head"><h3>Save or Share</h3><button class="modal-close" id="mClose">✕</button></div><p style="font-size:12.5px; color:var(--ink-dim); line-height:1.7; margin-bottom:14px;">Press and hold the button below, then choose Save to Files / Download (or Share to send it).</p><a href="${dataUrl}" download="${esc(filename)}" style="display:block; text-align:center; background:var(--panel-2); border:1px solid var(--gold-dim); color:var(--gold); padding:14px; border-radius:10px; font-weight:700; text-decoration:none;">⬇ ${esc(filename)}</a>`); document.getElementById('mClose').onclick=closeModal; }

function svgBarChart(items){
  const max=100,rowH=34,padL=140,padR=66,padT=12,w=640; const h=padT*2+items.length*rowH; const barW=w-padL-padR; let bars='';
  items.forEach((it,i)=>{ const y=padT+i*rowH; const val=Math.max(0,Number(it.value)||0); const len=Math.max(2,Math.min(val,max)/max*barW); const col=it.color||'#C9A24B'; bars+=`<text x="${padL-10}" y="${y+rowH/2+4}" text-anchor="end" font-size="13" fill="#333">${esc(it.label)}</text>`; bars+=`<rect x="${padL}" y="${y+6}" width="${barW}" height="16" rx="4" fill="#eceff1"/>`; bars+=`<rect x="${padL}" y="${y+6}" width="${len}" height="16" rx="4" fill="${col}"/>`; bars+=`<text x="${padL+barW+8}" y="${y+rowH/2+4}" font-size="12" fill="#444">${(Math.round(val*10)/10)}%</text>`; });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:660px;display:block;margin:8px 0 4px;font-family:Segoe UI,Arial">${bars}</svg>`;
}
function svgMoneyBars(items){
  const max=Math.max(1,...items.map(i=>Number(i.value)||0)); const rowH=34,padL=150,padR=130,padT=12,w=720; const h=padT*2+items.length*rowH; const barW=w-padL-padR; let bars='';
  items.forEach((it,i)=>{ const y=padT+i*rowH; const val=Math.max(0,Number(it.value)||0); const len=Math.max(2,val/max*barW); const col=it.color||'#C9A24B'; bars+=`<text x="${padL-10}" y="${y+rowH/2+4}" text-anchor="end" font-size="13" fill="#333">${esc(it.label)}</text>`; bars+=`<rect x="${padL}" y="${y+6}" width="${barW}" height="16" rx="4" fill="#eceff1"/>`; bars+=`<rect x="${padL}" y="${y+6}" width="${len}" height="16" rx="4" fill="${col}"/>`; bars+=`<text x="${padL+barW+8}" y="${y+rowH/2+4}" font-size="11" fill="#444">${fmtMoney(val)}</text>`; });
  return `<svg viewBox="0 0 ${w} ${h}" width="100%" style="max-width:740px;display:block;margin:8px 0 4px;font-family:Segoe UI,Arial">${bars}</svg>`;
}
function buildSalesLogContent(){
  const month=DB.currentMonth; const auto=salesLogAutoRows(month); const manual=salesLogMonthRows(month); const totals=salesLogTotals(month);
  const kpis=`<div class="kpis"><div class="kpi"><div class="v">${round1(totals.count)}</div><div class="l">Total Contracts</div></div><div class="kpi"><div class="v">${fmtMoney(totals.value)} EGP</div><div class="l">Total Sales Value</div></div><div class="kpi"><div class="v">${DB.salespeople.length}</div><div class="l">Salespeople</div></div></div>`;
  const chartItems=auto.filter(r=>r.value>0).map((r,i)=>({label:r.name,value:r.value,color:(i%2)?'#3FA796':'#C9A24B'}));
  const chart=chartItems.length?`<div class="card"><h2>Sales Value by Salesperson</h2>${svgMoneyBars(chartItems)}</div>`:'';
  const autoRows=auto.map(r=>{ const br=`Deals: ${round1(r.autoCount)} / ${fmtMoney(r.autoValue)} EGP`+((r.extraCount||r.extraValue)?` · Added: ${round1(r.extraCount)} / ${fmtMoney(r.extraValue)} EGP`:''); return [esc(r.name)+(isDirect(r.spId)?' (Direct)':''), `<b>${round1(r.count)}</b>`, `<b class="num">${fmtMoney(r.value)}</b>`, `<span style="font-size:11px;color:#7a8893;">${br}</span>`]; });
  const manualRows=manual.map(r=>[esc(r.name||'—'), `<span class="num">${round1(Number(r.count)||0)}</span>`, `<span class="num">${fmtMoney(salesLogManualValue(r))}</span>`]);
  const totalCard=`<div class="kpis"><div class="kpi" style="background:linear-gradient(135deg,#1b2630,#0f1417);border:none;"><div class="v" style="color:#C9A24B;">${fmtMoney(totals.value)} EGP</div><div class="l" style="color:#cbd3d8;">Grand Total Value</div></div><div class="kpi" style="background:linear-gradient(135deg,#1b2630,#0f1417);border:none;"><div class="v" style="color:#3FA796;">${round1(totals.count)}</div><div class="l" style="color:#cbd3d8;">Grand Total Contracts</div></div></div>`;
  const inner=`${kpis}${chart}<div class="card">${reportTable('Team Salespeople',['Salesperson','Total Contracts','Total Value (EGP)','Breakdown'],autoRows)}</div>${manual.length?`<div class="card">${reportTable('Former / Manual Salespeople',['Salesperson','Contracts','Value (EGP)'],manualRows)}</div>`:''}${totalCard}`;
  return { fname:`Sales_Log_${month}`, title:"Sowalem — Sales Log", subtitle:monthLabel(month)+' · Total Contracts and Value', inner };
}
function exportSalesLogPdf(){ const c=buildSalesLogContent(); downloadReport(c.fname,c.title,c.subtitle,c.inner); }
function exportSalesLogXlsx(){
  const month=DB.currentMonth; const auto=salesLogAutoRows(month); const manual=salesLogMonthRows(month); const totals=salesLogTotals(month);
  const rows=[['Salesperson','Type','Deal Contracts','Deal Value','Old/Extra Contracts','Old/Extra Value','Total Contracts','Total Value']];
  auto.forEach(r=>rows.push([r.name,isDirect(r.spId)?'Direct':'Division',round1(r.autoCount),r.autoValue,r.extraCount,r.extraValue,round1(r.count),r.value]));
  if(manual.length){ rows.push([]); rows.push(['Former / manual','','','','','','','']); manual.forEach(r=>rows.push([r.name,'',Number(r.count)||0,salesLogManualValue(r),'','',round1(Number(r.count)||0),salesLogManualValue(r)])); }
  rows.push([]); rows.push(['GRAND TOTAL','','','','','',round1(totals.count),totals.value]);
  downloadCSV(`Sales_Log_${month}.csv`,rows,'Sales Log — '+monthLabel(month));
}
function reportTable(title,headers,rows,note){
  const head=`<tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>`;
  const body=rows.length?rows.map(r=>`<tr>${r.map(c=>`<td>${c===undefined||c===null?'':c}</td>`).join('')}</tr>`).join(''):`<tr><td colspan="${headers.length}" style="text-align:center;color:#999;padding:14px;">No records this month</td></tr>`;
  return `<h2>${esc(title)} <span style="font-size:12px;color:#888;font-weight:normal;">(${rows.length})</span></h2>${note?`<p class="note">${note}</p>`:''}<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

function reportBodyWrap(title,subtitle,innerHtml){ return `<div class="wrap"><div class="head"><h1>${esc(title)}</h1><div class="sub">${subtitle||''}</div><div class="gen">Generated ${new Date().toLocaleString('en-GB')}</div></div>${innerHtml}</div>`; }
function reportShell(title,subtitle,innerHtml){ return `<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${esc(title)}</title><style>${reportCSS()}.printbtn{position:fixed;bottom:18px;right:18px;background:#C9A24B;color:#1a1407;border:none;border-radius:30px;padding:13px 22px;font-size:14px;font-weight:700;box-shadow:0 4px 14px rgba(0,0,0,.2);cursor:pointer;}@media print{.printbtn{display:none;}body{background:#fff;}.wrap{max-width:100%;padding:0;}.card,.kpi,.head{break-inside:avoid;}}</style></head><body>${reportBodyWrap(title,subtitle,innerHtml)}<button class="printbtn" onclick="window.print()">🖨 Print / Save as PDF</button></body></html>`; }
async function htmlToPdfBlob(title,subtitle,innerHtml){
  const ok1=await ensureHtml2Canvas(); const ok2=await ensureJsPDF();
  if(!ok1||!ok2||typeof window.html2canvas==='undefined'||typeof window.jspdf==='undefined') return null;
  const container=document.createElement('div');
  container.style.position='fixed'; container.style.left='-99999px'; container.style.top='0'; container.style.width='800px'; container.style.zIndex='-1'; container.style.background='#f4f6f8'; container.style.opacity='1'; container.style.pointerEvents='none';
  const styleTag=document.createElement('style'); styleTag.textContent=reportCSS(); container.appendChild(styleTag);
  const bodyDiv=document.createElement('div'); bodyDiv.innerHTML=reportBodyWrap(title,subtitle,innerHtml); container.appendChild(bodyDiv);
  document.body.appendChild(container);
  await new Promise(r=>setTimeout(r,250)); await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  let canvas; try{ canvas=await window.html2canvas(bodyDiv,{backgroundColor:'#f4f6f8',scale:2,useCORS:true,width:800,windowWidth:800}); }catch(e){ canvas=null; }
  try{ document.body.removeChild(container); }catch(e){}
  if(!canvas||!canvas.width||!canvas.height) return null;
  try{ const {jsPDF}=window.jspdf; const pdf=new jsPDF('p','pt','a4'); const pageWidth=pdf.internal.pageSize.getWidth(); const pageHeight=pdf.internal.pageSize.getHeight(); const imgWidth=pageWidth; const imgHeight=canvas.height*imgWidth/canvas.width; const imgData=canvas.toDataURL('image/jpeg',0.92); if(!imgData||imgData.length<200) return null; let heightLeft=imgHeight; let position=0; pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight); heightLeft-=pageHeight; while(heightLeft>0){ position=heightLeft-imgHeight; pdf.addPage(); pdf.addImage(imgData,'JPEG',0,position,imgWidth,imgHeight); heightLeft-=pageHeight; } return pdf.output('blob'); }catch(e){ return null; }
}
async function downloadReport(name,title,subtitle,innerHtml){
  showToast('Preparing PDF…'); const blob=await htmlToPdfBlob(title,subtitle,innerHtml); const fname=(name||'report');
  if(blob){ await shareOrDownload(fname+'.pdf','application/pdf',blob,{title}); }
  else { const html=reportShell(title,subtitle,innerHtml); await shareOrDownload(fname+'.html','text/html;charset=utf-8',html,{title,openInTab:true}); showToast('PDF tools unavailable — opened a printable page instead'); }
}
async function sharePdfReport(name,title,subtitle,innerHtml){
  showToast('Preparing PDF…'); const blob=await htmlToPdfBlob(title,subtitle,innerHtml);
  if(!blob){ showToast('Could not generate the PDF — check your connection and try again'); return; }
  await shareOrDownload((name||'report')+'.pdf','application/pdf',blob,{title});
}
function shareWhatsApp(text){ const w=window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank'); if(!w) showToast('Could not open WhatsApp — allow pop-ups'); }

  const slExportXlsx=document.getElementById('slExportXlsx'); if(slExportXlsx) slExportXlsx.onclick=exportSalesLogXlsx;
  const slAdd=document.getElementById('slAddRow'); if(slAdd) slAdd.onclick=()=>{ addSalesLogRow(DB.currentMonth); render(); };
  document.querySelectorAll('[data-slx-field]').forEach(el=>el.addEventListener('input',()=>{ const [spId,field]=el.dataset.slxField.split('|'); setSpExtra(DB.currentMonth,spId,field,el.value); updateSalesLogRow(spId); updateSalesLogFooter(); }));
  document.querySelectorAll('[data-slm-field]').forEach(el=>el.addEventListener('input',()=>{ const [id,field]=el.dataset.slmField.split('|'); const row=salesLogMonthRows(DB.currentMonth).find(r=>r.id===id); if(!row) return; if(field==='count') row.count=Number(el.value)||0; else if(field==='value') row.value=Number(el.value)||0; else row.name=el.value; save(); if(field!=='name'){ updateSalesLogManualRow(id); updateSalesLogFooter(); } }));
  document.querySelectorAll('[data-slm-up]').forEach(b=>b.onclick=()=>{ moveSalesLogRow(DB.currentMonth,b.dataset.slmUp,-1); render(); });
  document.querySelectorAll('[data-slm-down]').forEach(b=>b.onclick=()=>{ moveSalesLogRow(DB.currentMonth,b.dataset.slmDown,1); render(); });
  document.querySelectorAll('[data-slm-del]').forEach(b=>b.onclick=()=>{ const id=b.dataset.slmDel; const row=salesLogMonthRows(DB.currentMonth).find(r=>r.id===id); confirmAction(`Delete ${row&&row.name?row.name:'this row'}?`,()=>{ removeSalesLogRow(DB.currentMonth,id); render(); showToast('Deleted'); },{danger:true,yesLabel:'Delete'}); });
  document.querySelectorAll('[data-weight]').forEach(sl=>sl.addEventListener('input',()=>{ DB.weights[sl.dataset.weight]=Number(sl.value); save(); const v=sl.nextElementSibling; if(v) v.textContent=sl.value+'%'; const se=document.querySelector('.weight-sum'); if(se){ const sum=DB.weights.sales+DB.weights.reservations+(DB.weights.orientation||0)+DB.weights.attendance; se.textContent=`Total: ${sum}% ${sum!==100?'(should equal 100%)':''}`; se.classList.toggle('bad',sum!==100); } }));
  const odi=document.querySelector('[data-orientday]'); if(odi) odi.addEventListener('input',()=>{ DB.orientationPerDay=Math.max(0,Number(odi.value)||0); save(); });
  const mmi=document.querySelector('[data-meetmonth]'); if(mmi) mmi.addEventListener('input',()=>{ DB.meetingsPerMonth=Math.max(0,Number(mmi.value)||0); save(); });
  const dof=document.querySelector('[data-dayoff]'); if(dof) dof.onchange=()=>{ DB.dayOff=Number(dof.value); save(); };
  document.querySelectorAll('[data-tier]').forEach(inp=>inp.addEventListener('input',()=>{ DB.commissionTiers[inp.dataset.tier]=Number(inp.value)||0; save(); }));
  const qbk=document.getElementById('quickBackupBtn'); if(qbk) qbk.onclick=quickBackup;
  const qrs=document.getElementById('quickRestoreBtn'); if(qrs) qrs.onclick=()=>{ confirmAction('Restore your last Quick Backup? Current data will be replaced.',()=>{ quickRestore(); },{danger:true,yesLabel:'Restore'}); };
  const bb=document.getElementById('backupBtn'); if(bb) bb.onclick=downloadJsonBackup;
  const rb=document.getElementById('restoreBtn'); const rf=document.getElementById('restoreFile');
  if(rb&&rf){ rb.onclick=()=>{ try{ rf.value=''; }catch(e){} rf.click(); }; rf.onchange=(e)=>{ const file=e.target.files[0]; if(!file){ showToast('No file selected'); return; } const rd=new FileReader(); rd.onload=(ev)=>{ try{ const parsed=JSON.parse(ev.target.result); DB=(parsed&&parsed.db&&parsed.savedAt)?parsed.db:parsed; normalizeDB(); save(); render(); showToast('Restored successfully ✓'); }catch(err){ showToast('Not a valid backup file'); } }; rd.onerror=()=>showToast('Could not read the file'); rd.readAsText(file); }; }
  const wb=document.getElementById('wipeBtn'); if(wb) wb.onclick=()=>{ confirmAction('This erases ALL data permanently and cannot be undone. Continue?',()=>{ DB=defaultDB(); save(); render(); showToast('All data erased'); },{danger:true,yesLabel:'Erase everything',title:'Erase all data'}); };
  const cdb=document.getElementById('clearDealsBtn'); if(cdb) cdb.onclick=()=>{ confirmAction('Delete ALL done deals? This cannot be undone.',()=>{ DB.doneDeals=[]; save(); render(); showToast('All deals cleared'); },{danger:true,yesLabel:'Clear all'}); };
  const ccb=document.getElementById('clearCancelBtn'); if(ccb) ccb.onclick=()=>{ confirmAction('Delete ALL cancellation records? This cannot be undone.',()=>{ DB.cancellations=[]; save(); render(); showToast('All cancellations cleared'); },{danger:true,yesLabel:'Clear all'}); };
  const crb=document.getElementById('clearResBtn'); if(crb) crb.onclick=()=>{ confirmAction('Delete ALL reservations? This cannot be undone.',()=>{ DB.reservations=[]; save(); render(); showToast('All reservations cleared'); },{danger:true,yesLabel:'Clear all'}); };
}
function liveScores(spId){ const sp=getSp(spId); if(!sp) return; const direct=isDirect(spId); const score=direct?divisionScore(spId,'commercial',DB.currentMonth):combinedScore(spId,DB.currentMonth); const bars=document.querySelectorAll('#metricBarsBlock .mbar-row'); const vals=direct?[score.pSales,score.pMeet,score.pAtt]:[score.pSales,score.pRes,score.pOrient,score.pAtt]; bars.forEach((bar,i)=>{ const v=vals[i]; if(v===undefined) return; const ve=bar.querySelector('.mval'); const fe=bar.querySelector('.mbar-fill'); if(ve) ve.textContent=fmtPct(v)+'%'; if(fe) fe.style.width=Math.min(Math.min(v,130),100)+'%'; }); }
function liveDaily(spId,month){ const direct=isDirect(spId); const att=attendanceStats(spId,month); const orientDone=orientationAchieved(spId,month); const info=dailyInfoTotals(spId,month); const meetDone=meetingsAchieved(spId,month); const chipSets=document.querySelectorAll('.daily-totals'); chipSets.forEach(set=>{ const vs=set.querySelectorAll('.daily-total-chip .v'); const labels=Array.from(set.querySelectorAll('.daily-total-chip .l')).map(l=>l.textContent); if(labels[0]==='Compliance'){ if(vs[0]) vs[0].textContent=fmtPct(att.pct)+'%'; if(vs[1]) vs[1].textContent=att.onTimeInDays; if(vs[2]) vs[2].textContent=att.onTimeOutDays; } else if(labels[0]==='Meetings'){ if(vs[0]) vs[0].textContent=meetDone; if(vs[1]) vs[1].textContent=orientDone; if(vs[2]) vs[2].textContent=info.interested; } else if(labels[0]==='Total Leads'){ if(vs[0]) vs[0].textContent=orientDone; if(vs[1]) vs[1].textContent=info.interested; if(vs[2]) vs[2].textContent=info.notInterested; } else if(labels[0]==='Orientations'){ if(vs[0]) vs[0].textContent=orientDone; if(vs[1]) vs[1].textContent=info.interested; if(vs[2]) vs[2].textContent=info.notInterested; } else if(labels[0]==='Monthly Target'){ if(direct){ const mt=meetingsMonthlyTarget(spId,month); if(vs[1]) vs[1].textContent=meetDone; if(vs[2]) vs[2].textContent=fmtPct(mt>0?(meetDone/mt)*100:0)+'%'; } else { const tgt=orientationMonthlyTarget(spId,month); if(vs[1]) vs[1].textContent=orientDone; if(vs[2]) vs[2].textContent=fmtPct(tgt>0?(orientDone/tgt)*100:0)+'%'; } } }); }
function liveBroker(sp){ const s=brokerStats(sp); const vs=document.querySelectorAll('.broker-stat .v'); if(vs[0]) vs[0].textContent=s.total; if(vs[1]) vs[1].textContent=s.exclusive; if(vs[2]) vs[2].textContent=s.shared; }

const _mo=document.getElementById('modalOverlay');
if(_mo){ _mo.addEventListener('click',(e)=>{ if(e.target.id==='modalOverlay') closeModal(); }); }
window.addEventListener('pagehide',flushSave);
window.addEventListener('beforeunload',flushSave);
window.addEventListener('blur',flushSave);
window.addEventListener('online',()=>{ if(_dirty) flushSave(); });
document.addEventListener('visibilitychange',()=>{ if(document.visibilityState==='hidden') flushSave(); });
try{ window.addEventListener('freeze',flushSave); }catch(e){}
try{ window.addEventListener('pagehide',flushSave,{capture:true}); }catch(e){}
try{ document.addEventListener('pause',flushSave); }catch(e){}
setInterval(()=>{ if(_dirty) flushSave(); },2000);
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
async function init(){
  try{ await loadFromStorage(); }catch(e){}
  try{ render(); }
  catch(err){ document.getElementById('app').innerHTML='<div style="padding:40px 20px; text-align:center; color:#8FA0A8;"><p style="font-size:14px;">A problem occurred while loading. Try reopening.</p><p style="font-size:11px; margin-top:8px; color:#5C6B72;">'+esc(err.message||err)+'</p></div>'; }
}
init();
</script>
